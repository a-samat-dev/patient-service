server:
  port: 8084
  servlet:
    context-path: /patient-service
spring:
  application:
    name: patient-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/patientService
      database: patientService
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    instance-id: ${spring.application.name}:${random.value}